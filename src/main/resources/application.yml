micronaut:
  application:
    name: flightbooking-backend
  security:
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForANewOne}
datasources:
  default:
    url: jdbc:postgresql://localhost:5432/flightbooking
    driver-class-name: org.postgresql.Driver
    db-type: postgres
    username: flightbooking
    password: flightbooking
    dialect: POSTGRES
flyway:
  datasources:
    default:
      enabled: true
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: validate
