micronaut:
  application:
    name: flightbooking-backend
  server:
    cors:
      enabled: true
      configurations:
        frontend:
          allowed-origins:
            - "http://localhost:5173"
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - Authorization
            - Content-Type
  security:
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: "my-super-secret-key-that-must-be-at-least-256-bits-long-for-jwt-to-work-properly-in-micronaut"
datasources:
  default:
    url: jdbc:postgresql://localhost:5432/flightbooking
    driver-class-name: org.postgresql.Driver
    db-type: postgres
    username: flightbooking
    password: flightbooking
    dialect: POSTGRES
flyway:
  datasources:
    default:
      enabled: true
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: validate
